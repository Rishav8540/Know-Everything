# Server
server.port=8080

# Groq AI Configuration (Free Cloud AI)
groq.api-key=${GROQ_API_KEY}
groq.base-url=https://api.groq.com/openai/v1
groq.model=llama3-8b-8192

# H2 Database
spring.datasource.url=jdbc:h2:file:./data/knoweverything
spring.datasource.driver-class-name=org.h2.Driver
spring.datasource.username=sa
spring.datasource.password=
spring.jpa.database-platform=org.hibernate.dialect.H2Dialect
spring.jpa.hibernate.ddl-auto=update
spring.h2.console.enabled=false

# CORS - allow all for deployment
app.cors.allowed-origins=${ALLOWED_ORIGINS:http://localhost:5173}

# Logging
logging.level.com.knoweverything=INFO